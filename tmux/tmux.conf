# ==============================================================================
# Tmux Configuration for Heavy Neovim + Tmux Users
# ==============================================================================

# ─── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'danyim/tmux-remote'
set -g @plugin 'dhanifudin/tmux-config'

# ─── Catppuccin Theme Configuration ──────────────────────────────────────────
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "basic"

# Window customization
set -g @catppuccin_window_flags "icon"

# Pane borders (minimal for Neovim users)
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "on"

# ─── Minimal Status Line ─────────────────────────────────────────────────────
set -g status-left-length 100
set -g status-right-length 100

# Status Left: Session only
set -g status-left "#{E:@catppuccin_status_session}"

# Status Right: Time only
set -g status-right "#{E:@catppuccin_status_date_time}"

# ─── Window Status (Center) ──────────────────────────────────────────────────
# Inactive windows: show index only
set -g window-status-format " #I "
set -g window-status-style "fg=#{@thm_overlay_0},bg=default"

# Active window: show index + current path
set -g window-status-current-format " #I:#{b:pane_current_path} "
set -g window-status-current-style "fg=#{@thm_blue},bg=default,bold"

# Window separator
set -gF window-status-separator " "

# ─── Pane Settings ────────────────────────────────────────────────────────────
setw -g pane-border-lines single
setw -g pane-border-format ""

# ─── Window Settings ─────────────────────────────────────────────────────────
set -wg automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# ─── Neovim Optimization ─────────────────────────────────────────────────────
# Disable focus reporting to prevent Neovim terminal issues
set -g focus-events off

# Faster scrolling
set -wg aggressive-resize on

# ─── Initialize TPM ──────────────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
